openapi: 3.0.0
components:
  schemas:
    SharedModel:
      type: object
      required:
        - name
      properties:
        name:
          type: string
  responses:
    ErrorResponse:
      description: "Response on error"
      content:
        application/json:
          schema:
            type: object
            required:
              - message
              - code
            properties:
              message:
                type: string
              code:
                type: integer
    SucccessResponse:
      description: "Response on success"
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
    ReferencedResponse:
      description: "Response whose schema is a $ref — should NOT generate a duplicate class"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SharedModel'
