openapi: 3.0.3
info:
  title: oneOf with shared discriminated parent
  version: 1.0.0
paths:
  /actions:
    post:
      operationId: performAction
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActionRequest'
      responses:
        '200':
          description: OK
components:
  schemas:
    ParentAction:
      type: object
      discriminator:
        propertyName: actionType
        mapping:
          CHILD_A: '#/components/schemas/ChildActionA'
          CHILD_B: '#/components/schemas/ChildActionB'
      properties:
        actionType:
          type: string
          enum:
            - CHILD_A
            - CHILD_B
      required:
        - actionType

    ChildActionA:
      allOf:
        - $ref: '#/components/schemas/ParentAction'
        - type: object
          properties:
            fieldA:
              type: string

    ChildActionB:
      allOf:
        - $ref: '#/components/schemas/ParentAction'
        - type: object
          properties:
            fieldB:
              type: integer

    ActionRequest:
      type: object
      properties:
        id:
          type: string
        action:
          oneOf:
            - $ref: '#/components/schemas/ChildActionA'
            - $ref: '#/components/schemas/ChildActionB'
